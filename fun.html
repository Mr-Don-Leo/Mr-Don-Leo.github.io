<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Fun Stuff — Don Leo" />
  <title>Fun Stuff — Don Leo</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'dp-black':  '#0a0a0a',
            'dp-navy':   '#0f0e32',
            'dp-purple': '#342048',
            'dp-blue':   '#2c2a7b',
            'accent':    '#a855f7',
            'accent-2':  '#c026d3',
            'neon':      '#d946ef',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ==========================================
       HEADER / NAV
       ========================================== -->
  <header id="site-header">
    <a href="index.html" class="nav-logo">Don Leo</a>

    <nav aria-label="Main navigation">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>

        <li class="dropdown">
          <button class="dropdown-btn" aria-haspopup="true" aria-expanded="false">
            Features <span class="arrow">▾</span>
          </button>
          <div class="dropdown-menu" role="menu">
            <span class="disabled-item">Nothing here yet…</span>
            <hr />
            <a href="contact.html" role="menuitem">Suggest a feature</a>
          </div>
        </li>

        <li><a href="fun.html">Fun Stuff</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>

    <button id="hamburger" class="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- Mobile overlay -->
  <div id="mobile-menu" class="mobile-menu" aria-hidden="true">
    <a href="index.html">Home</a>
    <button id="mobile-features-btn">
      Features <span class="arrow" style="transition:transform 0.25s ease;">▾</span>
    </button>
    <div id="mobile-features-sub" class="mobile-sub">
      <a href="contact.html">Suggest a feature</a>
    </div>
    <a href="fun.html">Fun Stuff</a>
    <a href="contact.html">Contact Us</a>
  </div>

  <!-- ==========================================
       FUN STUFF — COMING SOON
       ========================================== -->
  <main>
    <!-- Background orbs -->
    <div class="orb orb-1" style="opacity:0.22;" aria-hidden="true"></div>
    <div class="orb orb-2" style="opacity:0.18;" aria-hidden="true"></div>
    <div class="orb orb-3" style="opacity:0.14;" aria-hidden="true"></div>

    <section
      class="page-section"
      style="justify-content:center;align-items:center;"
      aria-labelledby="fun-heading"
    >
      <div class="coming-soon-content">
        <span class="cs-icon" aria-hidden="true">&#127918;</span>
        <h1 id="fun-heading">Fun Stuff</h1>
        <p>
          I'm cooking something up here — games, experiments, weird little
          interactive things. Check back soon.
        </p>
        <div class="btn-group">
          <a href="index.html" class="btn-primary">&#8592; Back Home</a>
          <a href="contact.html" class="btn-secondary">Suggest an idea</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>
      &copy; <span id="year"></span> Don Leo &mdash;
      <a href="https://github.com/Mr-Don-Leo" target="_blank" rel="noopener">GitHub</a>
    </p>
  </footer>

  <script src="script.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
